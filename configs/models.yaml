# Generation defaults.
#
# NOTE: The preset values below were created for Apple MacBook Pro M3
# with 24GB unified memory (local MLX inference/fine-tuning).
# Suggested starting values by model size:
# 2B:
#   qa_generator.max_tokens: 256
#   answer_model.max_tokens: 320
#   temperature: 0.20
# 4B:
#   qa_generator.max_tokens: 224
#   answer_model.max_tokens: 256
#   temperature: 0.20
# 7B:
#   qa_generator.max_tokens: 160
#   answer_model.max_tokens: 192
#   temperature: 0.15

qa_generator:
  provider: mlx
  model: mlx-community/gemma-2-2b-it
  # Active default tuned for MacBook Pro M3 24GB when using 4B models.
  max_tokens: 256
  temperature: 0.2

answer_model:
  provider: mlx
  model: mlx-community/gemma-3-4b-it-bf16
  adapter_path: data/models/gemma-3-4b-it-bf16-lora
  # Active default tuned for MacBook Pro M3 24GB when using 4B models.
  max_tokens: 320
  temperature: 0.2

embeddings:
  model_name: BAAI/bge-base-en-v1.5
  normalize_embeddings: true
