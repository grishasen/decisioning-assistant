# Generation defaults.
#
# Baseline values below are tuned for Apple MacBook Pro M3 24GB.
# They are not hard limits: increase tokens/temperature/model size on larger hardware.
#
# Suggested starting values by model size:
# 2B:
#   qa_generator.max_tokens: 320
#   answer_model.max_tokens: 600
# 4B:
#   qa_generator.max_tokens: 384
#   answer_model.max_tokens: 900
# 7B:
#   qa_generator.max_tokens: 512
#   answer_model.max_tokens: 1200

qa_generator:
  provider: mlx
  model: mlx-community/gemma-3-4b-it-bf16
  # M3 24GB baseline; raise for larger-memory systems or smaller quantized models.
  max_tokens: 384
  temperature: 0.15
  trust_remote_code: true

answer_model:
  provider: mlx
  model: mlx-community/gemma-3-4b-it-bf16
  #adapter_path: data/models/gemma-3-4b-it-bf16-lora
  # M3 24GB baseline; can be increased on larger-memory systems.
  max_tokens: 900
  temperature: 0.15
  trust_remote_code: true

embeddings:
  model_name: BAAI/bge-base-en-v1.5
  normalize_embeddings: true
