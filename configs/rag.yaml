# RAG retrieval and prompt budget config.
#
# Baseline values below were tuned for Apple MacBook Pro M3 24GB.
# They are intentionally configurable for larger future hardware (for example M5 48GB).

# Hybrid indexing corpus:
# - chunks from source documents
# - synthetic QA pairs generated from those chunks
chunks_path: data/staging/chunks/chunks.jsonl
include_qa: true
qa_path: data/qa/qa_clean.jsonl
# question_answer | question_only | answer_only
qa_text_mode: question_answer
max_qa_answer_chars: 1400

qdrant_path: data/rag/vectordb
collection_name: docs
embedding_model: BAAI/bge-base-en-v1.5
normalize_embeddings: true

# Retrieval defaults + UI bounds.
top_k: 8
top_k_min: 1
top_k_max: 100

# Fetch more candidates first, then rerank/filter/diversify.
fetch_k: 30
score_threshold: 0.12
# none | embedding_cosine | cross_encoder
rerank_mode: cross_encoder
# Used only when rerank_mode=cross_encoder
reranker_model: BAAI/bge-reranker-base
# Blend between rerank score and original vector score.
# final = rerank_alpha * rerank + (1-rerank_alpha) * vector_score
rerank_alpha: 0.65
# Mild boost for qa_pair records at retrieval time.
qa_pair_score_boost: 0.03
# 0 disables per-source cap
max_per_source: 3

max_context_chunks: 6
max_context_chunks_min: 1
max_context_chunks_max: 50

# Character-based budgets (always available).
max_history_turns: 8
max_history_chars: 6000
max_chunk_chars: 2400
max_total_context_chars: 9000
max_prompt_chars: 18000

# Optional token budgets (0 disables).
max_history_tokens: 1200
max_chunk_tokens: 700
max_total_context_tokens: 2600
max_prompt_tokens: 5000

# Embedding/indexing throughput-memory tradeoff.
index_batch_size: 128
